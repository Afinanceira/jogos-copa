<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>AFinanceira | Terminal de Inteligência</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body>

<header>
    <h1>AFINANCEIRA | TERMINAL DE INTELIGÊNCIA - BRASIL 2026</h1>
</header>

<img src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg" class="bola" style="top: 200px; left: 100px;">
<img src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg" class="bola" style="bottom: 100px; right: 150px; animation-delay: 2s;">

<div class="container">
    <div class="card">
        <h2 style="color: var(--gold);">Análise Tática Histórica</h2>
        <p style="color: var(--verde); font-weight: bold;">BRASIL 1x1 MARROCOS</p>
        <p>Estratégia: Jogo posicional. Bloqueio tático sofrido por transição em bloco baixo.</p>
        <p style="color: var(--verde); font-weight: bold;">BRASIL 3x0 HAITI</p>
        <p>Estratégia: Pressão alta vertical. Superioridade técnica na conclusão.</p>
    </div>

    <div class="card">
        <h2 style="color: var(--gold);">Input de Dados</h2>
        <input type="text" id="nome" placeholder="Analista Responsável">
        <button onclick="registrar()">REGISTRAR ANÁLISE</button>
    </div>
</div>

<script>
    function registrar() {
        confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
        alert("Análise registrada com sucesso!");
    }
</script>
</body>
</html>
